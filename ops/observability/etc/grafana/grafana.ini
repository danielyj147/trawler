[paths]
data = data/grafana
logs = log
plugins = data/grafana/plugins
provisioning = etc/grafana/provisioning

[server]
http_addr = 0.0.0.0
http_port = 3001
root_url = http://0.0.0.0:3001

[security]
disable_initial_admin_creation = false

[users]
default_theme = dark

[analytics]
reporting_enabled = false
check_for_updates = true

[news]
news_feed_enabled = false
