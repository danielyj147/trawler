global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: trawler-feed
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:3000"]
        labels: { service: trawler, subsystem: feed }
  - job_name: trawler-matching
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:3002"]
        labels: { service: trawler, subsystem: matching }
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]
